name: Build app

# Builds the Tincan Flutter app for Android and Windows and uploads the
# binaries as downloadable artifacts on every push to main (and on demand).
on:
  push:
    branches: [main, "claude/**"]
    paths:
      - "app/**"
      - "packages/**"
      - ".github/workflows/build.yaml"
  workflow_dispatch:

jobs:
  android:
    name: Android (APK)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Ensure platform scaffolding
        working-directory: app
        run: flutter create . --project-name tincan --platforms=android

      - name: Install dependencies
        working-directory: app
        run: flutter pub get

      - name: Analyze
        working-directory: app
        run: flutter analyze

      - name: Build debug APK
        working-directory: app
        run: flutter build apk --debug

      - uses: actions/upload-artifact@v4
        with:
          name: tincan-android-debug-apk
          path: app/build/app/outputs/flutter-apk/app-debug.apk
          if-no-files-found: error

  windows:
    name: Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Ensure platform scaffolding
        working-directory: app
        run: flutter create . --project-name tincan --platforms=windows

      - name: Install dependencies
        working-directory: app
        run: flutter pub get

      - name: Build Windows
        working-directory: app
        run: flutter build windows --release

      - uses: actions/upload-artifact@v4
        with:
          name: tincan-windows-x64
          path: app/build/windows/x64/runner/Release/
          if-no-files-found: error
