name: payk_core
description: >-
  Pure-Dart cryptography and protocol core for the Payk serverless,
  end-to-end-encrypted messenger. No Flutter dependency, so it runs and is
  unit-tested on plain Dart and is reusable across Android, Windows and beyond.
version: 0.1.0
publish_to: none

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  cryptography_plus: ^3.0.0
  crypto: ^3.0.0

dev_dependencies:
  test: ^1.25.0
  lints: ^5.0.0
